server:
  port: 8082

spring:
  application:
    name: station-service

  datasource:
    url: jdbc:postgresql://localhost:5432/evroaming_station
    username: evroaming
    password: evroaming_secret
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: station-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # DEV MODE: JWT validation disabled (see SecurityConfig)
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: http://localhost:8080/realms/ev-roaming-hub

# OCPP Configuration
ocpp:
  heartbeat-interval: 300   # seconds
  websocket-path: /ocpp
  session-timeout: 60       # seconds to wait before marking disconnected

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.evroaminghub: DEBUG
    org.springframework.web.socket: INFO
