server:
  port: 8000

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
            maxAge: 3600

      routes:
        # Auth Service
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # Station Service
        - id: station-service
          uri: ${STATION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/stations/**
          filters:
            - StripPrefix=0

        # OCPP WebSocket
        - id: ocpp-websocket
          uri: ${OCPP_WEBSOCKET_URL:ws://localhost:8082}
          predicates:
            - Path=/ocpp/**

        # Session Service
        - id: session-service
          uri: ${SESSION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/sessions/**
          filters:
            - StripPrefix=0

        # Billing Service
        - id: billing-service
          uri: ${BILLING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/billing/**
          filters:
            - StripPrefix=0

        # Payment Service
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0

        # Roaming Service (OCPI)
        - id: roaming-service
          uri: ${ROAMING_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/ocpi/**
          filters:
            - StripPrefix=0

        # Settlement Service
        - id: settlement-service
          uri: ${SETTLEMENT_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/settlements/**
          filters:
            - StripPrefix=0

        # Notification Service
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0

  # DEV MODE: JWT validation disabled at gateway (see GatewaySecurityConfig)
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: http://localhost:8080/realms/ev-roaming-hub

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.evroaminghub: DEBUG
