server:
  port: 8081
  servlet:
    context-path: /api/v1/auth

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/evroaming_auth
    username: evroaming
    password: evroaming_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  # DEV MODE: JWT validation disabled (see SecurityConfig)
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: http://localhost:8080/realms/ev-roaming-hub
  #         jwk-set-uri: http://localhost:8080/realms/ev-roaming-hub/protocol/openid-connect/certs

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# JWT Configuration (for internal token generation)
jwt:
  secret: ev-roaming-hub-super-secret-key-minimum-256-bits-for-hs256-algorithm
  access-token-expiry-ms: 900000      # 15 minutes
  refresh-token-expiry-ms: 2592000000 # 30 days

# Application config
app:
  base-url: http://localhost:8081
  frontend-url: http://localhost:3000
  rfid:
    max-cards-per-user: 5

# Springdoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
  info:
    title: EV Roaming Hub - Auth Service API
    version: 1.0.0

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.evroaminghub: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
