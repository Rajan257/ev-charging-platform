input {
  tcp {
    port  => 5001
    codec => json_lines
  }
  beats {
    port => 5044
  }
}

filter {
  if [message] {
    mutate {
      add_field => { "[@metadata][index]" => "ev-roaming-%{+YYYY.MM.dd}" }
    }
  }
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
  mutate {
    remove_field => ["host"]
  }
}

output {
  elasticsearch {
    hosts     => ["elasticsearch:9200"]
    index     => "ev-roaming-%{+YYYY.MM.dd}"
    http_compression => true
  }
  stdout {
    codec => rubydebug
  }
}
