version: '3.9'

# =============================================================
# EV Roaming Hub India - Docker Compose
# All services + infrastructure for local development
# =============================================================
# Usage: docker-compose up -d
# =============================================================

networks:
  ev-network:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  keycloak_data:
  redis_data:

services:

  # ===================== INFRASTRUCTURE =====================

  postgres:
    image: postgres:16-alpine
    container_name: ev-postgres
    environment:
      POSTGRES_USER: evroaming
      POSTGRES_PASSWORD: evroaming_secret
      POSTGRES_DB: evroaming
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - ev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evroaming"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ev-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ev-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ev-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9093:9093"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ev-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ev-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: ev-roaming-hub
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "9094:8080"
    networks:
      - ev-network

  redis:
    image: redis:7-alpine
    container_name: ev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: ev-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: evroaming
      KC_DB_PASSWORD: evroaming_secret
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_REALM_NAME: ev-roaming-hub
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===================== MICROSERVICES =====================

  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    container_name: ev-api-gateway
    ports:
      - "8000:8000"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ev-roaming-hub
      SPRING_DATA_REDIS_HOST: redis
      AUTH_SERVICE_URL: http://auth-service:8081
      STATION_SERVICE_URL: http://station-service:8082
      OCPP_WEBSOCKET_URL: ws://station-service:8082
      SESSION_SERVICE_URL: http://session-service:8083
      BILLING_SERVICE_URL: http://billing-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      ROAMING_SERVICE_URL: http://roaming-service:8086
      SETTLEMENT_SERVICE_URL: http://settlement-service:8087
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    depends_on:
      - keycloak
      - redis
    networks:
      - ev-network

  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    container_name: ev-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evroaming_auth
      SPRING_DATASOURCE_USERNAME: evroaming
      SPRING_DATASOURCE_PASSWORD: evroaming_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ev-roaming-hub
      JWT_SECRET: ev-roaming-hub-super-secret-key-minimum-256-bits-for-hs256-algorithm
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ev-network

  station-service:
    build:
      context: ../backend/station-service
      dockerfile: Dockerfile
    container_name: ev-station-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evroaming_station
      SPRING_DATASOURCE_USERNAME: evroaming
      SPRING_DATASOURCE_PASSWORD: evroaming_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ev-roaming-hub
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ev-network

  session-service:
    build:
      context: ../backend/session-service
      dockerfile: Dockerfile
    container_name: ev-session-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evroaming_session
      SPRING_DATASOURCE_USERNAME: evroaming
      SPRING_DATASOURCE_PASSWORD: evroaming_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ev-roaming-hub
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ev-network

  billing-service:
    build:
      context: ../backend/billing-service
      dockerfile: Dockerfile
    container_name: ev-billing-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evroaming_billing
      SPRING_DATASOURCE_USERNAME: evroaming
      SPRING_DATASOURCE_PASSWORD: evroaming_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ev-roaming-hub
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ev-network

  payment-service:
    build:
      context: ../backend/payment-service
      dockerfile: Dockerfile
    container_name: ev-payment-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evroaming_payment
      SPRING_DATASOURCE_USERNAME: evroaming
      SPRING_DATASOURCE_PASSWORD: evroaming_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ev-roaming-hub
      RAZORPAY_KEY_ID: rzp_test_YOUR_KEY_ID
      RAZORPAY_KEY_SECRET: YOUR_KEY_SECRET
      RAZORPAY_MOCK_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ev-network

  roaming-service:
    build:
      context: ../backend/roaming-service
      dockerfile: Dockerfile
    container_name: ev-roaming-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evroaming_roaming
      SPRING_DATASOURCE_USERNAME: evroaming
      SPRING_DATASOURCE_PASSWORD: evroaming_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ev-roaming-hub
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ev-network

  settlement-service:
    build:
      context: ../backend/settlement-service
      dockerfile: Dockerfile
    container_name: ev-settlement-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evroaming_settlement
      SPRING_DATASOURCE_USERNAME: evroaming
      SPRING_DATASOURCE_PASSWORD: evroaming_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ev-roaming-hub
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ev-network

  notification-service:
    build:
      context: ../backend/notification-service
      dockerfile: Dockerfile
    container_name: ev-notification-service
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evroaming_notification
      SPRING_DATASOURCE_USERNAME: evroaming
      SPRING_DATASOURCE_PASSWORD: evroaming_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ev-roaming-hub
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: your-email@gmail.com
      SPRING_MAIL_PASSWORD: your-app-password
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ev-network

  # ===================== FRONTEND =====================

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ev-frontend
    ports:
      - "3001:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_KEYCLOAK_URL: http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - ev-network
