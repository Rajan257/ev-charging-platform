apiVersion: v1
kind: Namespace
metadata:
  name: ev-roaming-hub
  labels:
    app.kubernetes.io/name: ev-roaming-hub
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ev-common-config
  namespace: ev-roaming-hub
data:
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_USERNAME: "evroaming"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KEYCLOAK_URL: "http://keycloak-service:8080"
  JWT_ISSUER_URI: "http://keycloak-service:8080/realms/ev-roaming-hub"
  OTEL_ENDPOINT: "http://jaeger-service:4318/v1/traces"

---
apiVersion: v1
kind: Secret
metadata:
  name: ev-db-secret
  namespace: ev-roaming-hub
type: Opaque
stringData:
  POSTGRES_PASSWORD: "evroaming_secret"
  RAZORPAY_KEY_ID: "rzp_live_YOUR_KEY"
  RAZORPAY_KEY_SECRET: "YOUR_SECRET"
  JWT_SECRET: "ev-roaming-hub-super-secret-key-minimum-256-bits"

---
# ─── API Gateway ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ev-roaming-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ev-roaming-hub/api-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ev-common-config
            - secretRef:
                name: ev-db-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: ev-roaming-hub
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
# ─── Fraud Detection Service ─────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-service
  namespace: ev-roaming-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection-service
  template:
    metadata:
      labels:
        app: fraud-detection-service
    spec:
      containers:
        - name: fraud-detection-service
          image: ev-roaming-hub/fraud-detection-service:latest
          ports:
            - containerPort: 8095
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/evroaming_fraud"
          envFrom:
            - configMapRef:
                name: ev-common-config
            - secretRef:
                name: ev-db-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8095
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"

---
# ─── ML Service ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: ev-roaming-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: ev-roaming-hub/ml-service:latest
          ports:
            - containerPort: 8097
          readinessProbe:
            httpGet:
              path: /health
              port: 8097
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

---
# ─── HPA for high-traffic services ──────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: station-service-hpa
  namespace: ev-roaming-hub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: station-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: session-service-hpa
  namespace: ev-roaming-hub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: session-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# ─── Ingress ─────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ev-roaming-hub-ingress
  namespace: ev-roaming-hub
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.evroaminghub.in
      secretName: ev-tls-secret
  rules:
    - host: api.evroaminghub.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 8000
    - host: app.evroaminghub.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
